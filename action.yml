name: BlastGuard PR Blast Radius
description: Score pull request blast radius and review risk for .NET repositories.
author: kearns2000

branding:
  icon: shield
  color: orange

inputs:
  base:
    description: Base git ref to compare against. Requires actions/checkout with fetch-depth 0 so the ref is available.
    required: false
    default: origin/main
  head:
    description: Head git ref to analyse.
    required: false
    default: HEAD
  repo:
    description: Path to the git repository.
    required: false
    default: .
  format:
    description: Output format (text, json, markdown, or github).
    required: false
    default: github
  output:
    description: Output file path for the report.
    required: false
    default: blastguard-report.md
  config:
    description: Optional path to a blastguard.json configuration file.
    required: false
    default: ''
  fail-threshold:
    description: Fail the step when the score meets or exceeds this value. Leave empty to never fail.
    required: false
    default: ''
  include-suggestions:
    description: Include suggested review focus in the output.
    required: false
    default: 'true'
  version:
    description: BlastGuard NuGet tool version to install. Leave empty for latest. Pin this to the same release as the action tag when you need reproducible runs.
    required: false
    default: ''
  dotnet-version:
    description: .NET SDK version to install.
    required: false
    default: 10.0.x
  job-summary:
    description: Append the report to the GitHub Actions job summary.
    required: false
    default: 'true'

runs:
  using: composite
  steps:
    - name: Install .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: ${{ inputs.dotnet-version }}

    - name: Install BlastGuard
      shell: bash
      env:
        BLASTGUARD_VERSION: ${{ inputs.version }}
      run: |
        if [ -n "$BLASTGUARD_VERSION" ]; then
          if ! dotnet tool install --global BlastGuard --version "$BLASTGUARD_VERSION"; then
            dotnet tool update --global BlastGuard --version "$BLASTGUARD_VERSION"
          fi
        else
          if ! dotnet tool install --global BlastGuard; then
            dotnet tool update --global BlastGuard
          fi
        fi
        echo "$HOME/.dotnet/tools" >> "$GITHUB_PATH"

    - name: Run BlastGuard
      shell: bash
      env:
        BLASTGUARD_REPO: ${{ inputs.repo }}
        BLASTGUARD_BASE: ${{ inputs.base }}
        BLASTGUARD_HEAD: ${{ inputs.head }}
        BLASTGUARD_FORMAT: ${{ inputs.format }}
        BLASTGUARD_OUTPUT: ${{ inputs.output }}
        BLASTGUARD_CONFIG: ${{ inputs.config }}
        BLASTGUARD_FAIL_THRESHOLD: ${{ inputs.fail-threshold }}
        BLASTGUARD_INCLUDE_SUGGESTIONS: ${{ inputs.include-suggestions }}
      run: |
        args=(analyse
          --repo "$BLASTGUARD_REPO"
          --base "$BLASTGUARD_BASE"
          --head "$BLASTGUARD_HEAD"
          --format "$BLASTGUARD_FORMAT"
          --output "$BLASTGUARD_OUTPUT"
          --include-suggestions "$BLASTGUARD_INCLUDE_SUGGESTIONS")

        if [ -n "$BLASTGUARD_CONFIG" ]; then
          args+=(--config "$BLASTGUARD_CONFIG")
        fi

        if [ -n "$BLASTGUARD_FAIL_THRESHOLD" ]; then
          args+=(--fail-threshold "$BLASTGUARD_FAIL_THRESHOLD")
        fi

        blastguard "${args[@]}"

    - name: Add report to job summary
      if: ${{ always() && inputs.job-summary == 'true' }}
      shell: bash
      env:
        BLASTGUARD_OUTPUT: ${{ inputs.output }}
      run: |
        if [ -f "$BLASTGUARD_OUTPUT" ]; then
          cat "$BLASTGUARD_OUTPUT" >> "$GITHUB_STEP_SUMMARY"
        fi
