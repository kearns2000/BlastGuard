name: BlastGuard

on:
  pull_request:
    branches:
      - main

jobs:
  blastguard:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: kearns2000/BlastGuard@v1
        with:
          base: origin/main
          head: HEAD
          version: 1.1.1
